name: Deploy Infodesk Leavers to EC2 (SSM)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        shell: bash
        run: |
          set -euo pipefail

          INSTANCE_ID="$(
            aws ec2 describe-instances \
              --filters "Name=tag:Project,Values=infodesk-leavers" "Name=instance-state-name,Values=running" \
              --query 'Reservations[0].Instances[0].InstanceId' \
              --output text
          )"

          if [ -z "${INSTANCE_ID}" ] || [ "${INSTANCE_ID}" = "None" ]; then
            echo "No running instance found with tag Project=infodesk-leavers"
            exit 1
          fi

          COMMAND_ID="$(
            aws ssm send-command \
              --instance-ids "${INSTANCE_ID}" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy Infodesk Leavers" \
              --parameters 'commands=[
                "set -e",
                "cd /opt/infodesk-leavers",
                "git fetch --all",
                "git checkout main || git checkout -B main origin/main",
                "git pull --rebase || true",
                "npm install --omit=dev || npm install",
                "mkdir -p uploads/evidence data",
                "pm2 restart infodesk-leavers || pm2 start npm --name infodesk-leavers -- start",
                "pm2 save"
              ]' \
              --query 'Command.CommandId' \
              --output text
          )"

          aws ssm wait command-executed --command-id "${COMMAND_ID}" --instance-id "${INSTANCE_ID}"
          aws ssm get-command-invocation --command-id "${COMMAND_ID}" --instance-id "${INSTANCE_ID}"
